<!DOCTYPE html>
<html lang="uk">
<head>

<style id="hub-nav">
#hub-back-btn {
  position: fixed; top: 10px; left: 10px; z-index: 99999;
  background: #4f8ef7; color: white; border: none; border-radius: 8px;
  padding: 8px 14px; font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; display: flex; align-items: center;
  gap: 6px; box-shadow: 0 3px 12px rgba(79,142,247,0.5);
  text-decoration: none; white-space: nowrap;
}
#hub-back-btn:hover { background: #3d7ee8; }
#hub-nav-pills {
  position: fixed; top: 10px; right: 10px; z-index: 99999;
  display: flex; gap: 4px; align-items: center;
}
.hub-pill {
  background: rgba(24,28,37,0.92); border: 1px solid #252b3a;
  color: #8c93a8; border-radius: 6px; padding: 5px 10px;
  font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif;
  backdrop-filter: blur(8px); transition: all 0.12s;
}
.hub-pill:hover { color: #e8eaf0; border-color: #4f8ef7; }
.hub-pill.current { color: #4f8ef7; border-color: #4f8ef7;
  background: rgba(79,142,247,0.12); font-weight: 600; }

  .bool-label-de { font-size:11px;color:var(--text3);font-weight:700;min-width:32px;letter-spacing:0.5px;text-transform:uppercase; }
  .bool-row[data-rule="section"] { background: rgba(167,139,250,0.04); border-left: 2px solid #a78bfa; padding-left: 10px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UpSell — Програми</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c25;
  --surface2: #1e2330;
  --surface3: #242938;
  --border: #252b3a;
  --border-strong: #2f3548;
  --accent: #4f8ef7;
  --accent-soft: rgba(79,142,247,0.12);
  --accent2: #38d9a9;
  --accent2-soft: rgba(56,217,169,0.12);
  --accent3: #f7a84f;
  --accent3-soft: rgba(247,168,79,0.12);
  --accent4: #a78bfa;
  --accent4-soft: rgba(167,139,250,0.12);
  --danger: #f75f5f;
  --danger-soft: rgba(247,95,95,0.12);
  --text: #e8eaf0;
  --text2: #8c93a8;
  --text3: #5a6078;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.logo-text { font-family: 'Unbounded', sans-serif; font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); padding: 12px 20px 6px; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; color: var(--text2); transition: all 0.15s; font-size: 13px; position: relative; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--accent); background: var(--accent-soft); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
.nav-badge { margin-left: auto; background: var(--danger); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.nav-badge-subtle { margin-left: auto; background: var(--surface3); color: var(--text2); font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; }

/* MAIN */
.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
.topbar { height: 56px; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(15,17,23,0.9); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text3); }
.breadcrumb-sep { color: var(--border-strong); }
.breadcrumb-current { color: var(--text); font-weight: 500; }
.topbar-right { display: flex; gap: 10px; align-items: center; }

/* PAGE */
.page { padding: 28px; max-width: 1440px; flex: 1; overflow-y: auto; }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
.page-title { font-family: 'Unbounded', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" style="width:220px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;padding:0;overflow-y:auto;">
    <div class="logo"><div class="logo-text">UpSell</div><div class="logo-sub">Royal Canin UA</div></div>
    <div class="nav-section-label">Головне</div>
    <a class="nav-item" href="upsell-hub.html"><div class="nav-icon">📊</div>Головна</a>
    <a class="nav-item active" href="upsell-programs.html"><div class="nav-icon">📊</div>Програми</a>
    <div class="nav-section-label">Учасники</div>
    <a class="nav-item" href="upsell-participants.html"><div class="nav-icon">👥</div>Учасники</a>
    <div style="flex:1"></div>
    <div class="profile" style="margin-top:auto;border-top:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:10px;">
      <div style="width:30px;height:30px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);">ОК</div>
      <div><div style="font-size:12px;font-weight:500;">Олена Коваленко</div><div style="font-size:10px;color:var(--text3);">Адміністратор</div></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="breadcrumb">Програми <span class="breadcrumb-sep">/</span> <span class="breadcrumb-current">Список</span></div>
      <div class="topbar-right"></div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page">
      <div class="page-header">
        <div><div class="page-title">Програми лояльності</div><div class="page-subtitle">Керування активними та архівними програмами</div></div>
      </div>
      <p style="color:var(--text2);">Контент сторінки програм буде тут.</p>
    </div>
  </div>
</div>
</body>
</html>
